name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Run on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run static checks
        run: |
          python -m ruff check .

      - name: Check formatting
        run: |
          python -m ruff format --check .

      - name: Compile source
        run: |
          python -m compileall -q tree tree_cli.py

      - name: Run CLI help
        run: |
          python tree_cli.py --help

      - name: Run CLI end-to-end
        run: |
          mkdir -p /tmp/tree-playground/src
          printf 'hello\n' > /tmp/tree-playground/README.md
          printf 'print("oke")\n' > /tmp/tree-playground/src/main.py

          python tree_cli.py \
            --root /tmp/tree-playground \
            --output /tmp/Structure.txt \
            --ascii

          test -s /tmp/Structure.txt
          cat /tmp/Structure.txt